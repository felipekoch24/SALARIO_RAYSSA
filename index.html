<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR RAYSSA - 5º DIA ÚTIL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff; text-align: center; margin: 0; padding: 20px; color: #333; }
        h1 { color: #D81B60; font-size: 22px; margin-bottom: 5px; font-weight: 900; letter-spacing: -1px; }
        .sub { color: #888; font-size: 11px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
        
        .card { border: 2px solid #ddd; border-radius: 25px; margin: 15px auto; padding: 25px; width: 90%; max-width: 350px; transition: 0.5s; }
        .card-titulo { font-weight: bold; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; color: #666; }
        .card-dias { font-size: 48px; font-weight: 900; color: #000; line-height: 1; }
        
        /* Estados do Card */
        .normal { border-color: #eee; background-color: #fafafa; }
        .alerta-caixa { color: #D32F2F; border-color: #FFCDD2; background-color: #FFEBEE; }
        .chegou { color: #fff; background-color: #D81B60; border: 4px solid #FFD600; box-shadow: 0 10px 20px rgba(216, 27, 96, 0.3); }
        
        #msg-status { font-weight: 800; font-size: 14px; color: #D81B60; margin: 15px; text-transform: uppercase; min-height: 40px; }
        
        #frase-motivacao { 
            font-style: italic; font-weight: 700; font-size: 15px; margin: 20px auto; padding: 20px; 
            background: #f9f9f9; border-radius: 15px; width: 85%; max-width: 320px;
            border-left: 6px solid #D81B60; text-transform: uppercase; color: #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px;
        }

        .aviso-importante { font-size: 11px; color: #FFD600; font-weight: 900; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 5px; width: 100%; }
        
        button { width: 90%; max-width: 350px; padding: 18px; margin: 8px 0; border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .btn-gastar { background-color: #222; color: white; }
        .btn-update { background-color: #eee; color: #999; font-size: 11px; }
        
        footer { margin-top: 30px; color: #ccc; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>RADAR RAYSSA</h1>
    <div class="sub">CONTROLE ELITE • 5º DIA ÚTIL</div>

    <div id="card-principal" class="card normal">
        <div class="card-titulo" id="label-card">FALTAM PARA O PAGAMENTO</div>
        <div id="dias-contagem" class="card-dias">--</div>
    </div>

    <div id="msg-status">SINCRONIZANDO...</div>
    <div id="frase-motivacao">"O SUCESSO COMEÇA COM A DECISÃO DE TENTAR."</div>

    <button class="btn-gastar" onclick="alertaGasto()">QUERO COMPRAR ALGO</button>
    <button class="btn-update" onclick="atualizar()">ATUALIZAR STATUS</button>

    <footer>FELIPE AO SEU DISPOR • FOCO NO LEGADO</footer>

    <script>
        const frasesGeral = [
            "O FELIPE ESTÁ DE OLHO NO NOSSO FUTURO! SEGURA ESSE GASTO.",
            "CADA REAL GUARDADO É UM TIJOLO NA NOSSA CASA PRÓPRIA.",
            "QUEM TEM DINHEIRO NÃO É REFÉM DE NINGUÉM. FOCO NA META!",
            "VOCÊ É A PEÇA CHAVE DO NOSSO PLANO. MANTENHA A GUARDA ALTA!",
            "NÃO É SOBRE QUANTO GANHA, É SOBRE QUANTO SOBRA!",
            "MANTENHA O FOCO: A LIBERDADE VALE MAIS QUE QUALQUER BLUSA."
        ];

        function getProximoQuintoDiaUtil() {
            const hoje = new Date();
            let mes = hoje.getMonth();
            let ano = hoje.getFullYear();

            function calcular(m, a) {
                let diasUteis = 0;
                let dia = 1;
                while (diasUteis < 5) {
                    let d = new Date(a, m, dia);
                    let diaSemana = d.getDay();
                    if (diaSemana !== 0 && diaSemana !== 6) diasUteis++;
                    if (diasUteis < 5) dia++;
                }
                return new Date(a, m, dia);
            }

            let dataAlvo = calcular(mes, ano);
            const hojeZerado = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
            if (dataAlvo < hojeZerado) {
                mes++;
                if (mes > 11) { mes = 0; ano++; }
                dataAlvo = calcular(mes, ano);
            }
            return dataAlvo;
        }

        function atualizar() {
            const hoje = new Date();
            hoje.setHours(0,0,0,0);
            const alvo = getProximoQuintoDiaUtil();
            const diffMili = alvo - hoje;
            const dias = Math.ceil(diffMili / (1000 * 60 * 60 * 24));
            
            const card = document.getElementById('card-principal');
            const displayDias = document.getElementById('dias-contagem');
            const status = document.getElementById('msg-status');
            const motivacao = document.getElementById('frase-motivacao');
            const label = document.getElementById('label-card');

            if (dias === 0) {
                card.className = "card chegou";
                label.innerText = "ESTADO DE ELITE";
                displayDias.innerText = "VITÓRIA";
                status.innerText = "⭐ DIA DE PAGAMENTO! ⭐";
                
                // FRASE EXCLUSIVA DO FELIPE PARA O DIA 5 ÚTIL
                motivacao.innerHTML = `
                    <span style="color: #fff;">FELIPE ESTÁ ORGULHOSO, CONTINUE FIRME, ELE MANDOU FALAR QUE TE AMA MUITO E QUE VOCÊ É INCRÍVEL!❤️👑</span>
                    <div class="aviso-importante">⚠️ LEMBRETE: ATÉ O PRÓXIMO MÊS É LONGE!<br>SEPARA A GRANA DO DIA 20 TAMBÉM! 🔒</div>
                `;
            } else {
                displayDias.innerText = dias + (dias === 1 ? " DIA" : " DIAS");
                label.innerText = "FALTAM PARA O PAGAMENTO";
                motivacao.innerText = `"${frasesGeral[Math.floor(Math.random() * frasesGeral.length)]}"`;
                
                if (dias <= 3) {
                    card.className = "card alerta-caixa";
                    status.innerText = "⏳ QUASE LÁ! SEGURA O ÚLTIMO SUSPIRO!";
                } else {
                    card.className = "card normal";
                    status.innerText = "🛡️ MODO BLINDADO ATIVO";
                }
            }
        }

        function alertaGasto() {
            const frasesAlerta = [
                "O FELIPE IA DIZER: 'ISSO É REALMENTE NECESSÁRIO?'",
                "PENSA NA NOSSA CASA. ESSE GASTO VALE MAIS QUE UM TIJOLO?",
                "VOCÊ É ELITE. GUERREIRAS NÃO COMPRAM POR BOBAGEM."
            ];
            alert("MENSAGEM DO FELIPE:\n\n" + frasesAlerta[Math.floor(Math.random() * frasesAlerta.length)]);
        }

        atualizar();
    </script>
</body>
</html>
